services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  api:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/invitaciones
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-disabled}
      OPENWA_BASE_URL: http://host.docker.internal:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID:-}
    depends_on:
      - mongo
volumes:
  mongo-data:
